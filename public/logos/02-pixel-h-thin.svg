<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" shape-rendering="crispEdges">
  <g fill="#ffffff">
    <!-- Thin pixel h: 5 cols × 7 rows, single-pixel strokes, 8px cells with 7×7 blocks -->
    <!-- Left bar at col 1 (x=12), 7 rows -->
    <rect x="12" y="4"  width="7" height="7" />
    <rect x="12" y="12" width="7" height="7" />
    <rect x="12" y="20" width="7" height="7" />
    <rect x="12" y="28" width="7" height="7" />
    <rect x="12" y="36" width="7" height="7" />
    <rect x="12" y="44" width="7" height="7" />
    <rect x="12" y="52" width="7" height="7" />
    <!-- Connector at row 3 (y=28), cols 2-4 -->
    <rect x="20" y="28" width="7" height="7" />
    <rect x="28" y="28" width="7" height="7" />
    <rect x="36" y="28" width="7" height="7" />
    <rect x="44" y="28" width="7" height="7" />
    <!-- Right bar at col 5 (x=44), rows 4-6 -->
    <rect x="44" y="36" width="7" height="7" />
    <rect x="44" y="44" width="7" height="7" />
    <rect x="44" y="52" width="7" height="7" />
  </g>
</svg>
