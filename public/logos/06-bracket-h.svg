<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" shape-rendering="crispEdges">
  <g fill="#ffffff">
    <!-- Left bracket [ -->
    <rect x="4"  y="14" width="2" height="36" />
    <rect x="4"  y="14" width="6" height="2" />
    <rect x="4"  y="48" width="6" height="2" />
    <!-- Right bracket ] -->
    <rect x="58" y="14" width="2" height="36" />
    <rect x="54" y="14" width="6" height="2" />
    <rect x="54" y="48" width="6" height="2" />
    <!-- Pixel h, scaled smaller to fit between brackets (cols at x=16,22 / 28 / 34,40 / 46,52 etc.) -->
    <!-- Use 5-px pixels with 6-px cells so it fits in 44px between brackets -->
    <!-- Left bar (cols 0-1) x=16,22; rows 0-6 y=14,20,26,32,38,44,50 -->
    <rect x="16" y="14" width="5" height="5" /><rect x="22" y="14" width="5" height="5" />
    <rect x="16" y="20" width="5" height="5" /><rect x="22" y="20" width="5" height="5" />
    <rect x="16" y="26" width="5" height="5" /><rect x="22" y="26" width="5" height="5" />
    <rect x="16" y="32" width="5" height="5" /><rect x="22" y="32" width="5" height="5" />
    <rect x="16" y="38" width="5" height="5" /><rect x="22" y="38" width="5" height="5" />
    <rect x="16" y="44" width="5" height="5" /><rect x="22" y="44" width="5" height="5" />
    <rect x="16" y="50" width="5" height="5" /><rect x="22" y="50" width="5" height="5" />
    <!-- Connector (cols 2-3) -->
    <rect x="28" y="32" width="5" height="5" /><rect x="34" y="32" width="5" height="5" />
    <!-- Right bar (cols 4-5) -->
    <rect x="40" y="32" width="5" height="5" /><rect x="46" y="32" width="5" height="5" />
    <rect x="40" y="38" width="5" height="5" /><rect x="46" y="38" width="5" height="5" />
    <rect x="40" y="44" width="5" height="5" /><rect x="46" y="44" width="5" height="5" />
    <rect x="40" y="50" width="5" height="5" /><rect x="46" y="50" width="5" height="5" />
  </g>
</svg>
